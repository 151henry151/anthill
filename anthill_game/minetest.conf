# Game-layer defaults (see SettingsLayer in the engine). Applied when this game is run
# unless the same keys are set in the user's minetest.conf (user layer overrides game).
#
# The spectator camera sits far above the ground; the client must request a large enough
# mapblock radius (wanted_range from viewing_range). Server Lua cannot set remote clients.

viewing_range = 1200
max_block_send_distance = 72
active_object_send_range_blocks = 64
