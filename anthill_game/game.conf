title = Anthill
name = anthill_game
description = Desert grain-world simulation: each node is sand-grain scale; giant ants with wander, trails, and nest bias. Built on the Luanti engine only (no Minetest Game).
author = Anthill project
min_minetest_version = 5.8

# Terrain is generated in Lua (dunes); only "flat" is meaningful as a base pass.
allowed_mapgens = flat
default_mapgen = flat

# Hide Creative / damage / host-server toggles — not part of this game design.
disabled_settings = enable_damage, creative_mode, enable_server

# Hide engine mapgen UI the game does not use (dunes + ants are defined in Lua).
# mg_flags = caves/dungeons/decorations; seed = random seed field (engine still randomizes if empty).
disallowed_mapgen_settings = mg_flags, seed, mgflat_spflags, mgflat_ground_level, mgflat_large_cave_depth, mgflat_small_cave_num_min, mgflat_small_cave_num_max, mgflat_large_cave_num_min, mgflat_large_cave_num_max, mgflat_large_cave_flooded, mgflat_cave_width, mgflat_lake_threshold, mgflat_lake_steepness, mgflat_hill_threshold, mgflat_hill_steepness, mgflat_cavern_limit, mgflat_cavern_taper, mgflat_cavern_threshold, mgflat_dungeon_ymin, mgflat_dungeon_ymax, mgflat_np_terrain, mgflat_np_filler_depth, mgflat_np_cave1, mgflat_np_cave2, mgflat_np_cavern, mgflat_np_dungeons
